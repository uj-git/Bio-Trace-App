# Server runs on port 8080 by default
server.port=8080

# H2 Database config - everything is stored in memory while the app is running
spring.datasource.url=jdbc:h2:mem:biotrace
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA config - automatically creates the database tables from our Java classes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console - lets you view the database in your browser at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show SQL queries in the console (helpful for learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
